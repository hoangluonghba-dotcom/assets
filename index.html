<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHI PHÍ</title>

<!-- Icon cho trình duyệt -->
<link rel="icon" type="image/png" href="logo.png">

<!-- Icon khi Add to Home Screen trên iPhone -->
<link rel="apple-touch-icon" href="logo.png">

<!-- Manifest -->
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#d62828">

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#d62828;
    font-family:Arial,sans-serif;
    color:#fff;
}

.loader{
    text-align:center;
}

.loader img{
    width:120px;
    height:120px;
    border-radius:26px;
    box-shadow:0 0 25px rgba(255,255,255,.35);
}

.loader h2{
    margin:18px 0 8px;
    font-size:30px;
}

.loader p{
    opacity:.85;
}
</style>

</head>

<body>

<div class="loader">
    <img src="logo.png" alt="CHI PHÍ">
    <h2>CHI PHÍ</h2>
    <p>Đang mở ứng dụng...</p>
</div>

<script>
// Đăng ký Service Worker
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");
}

// Chuyển sang Apps Script
setTimeout(function () {
    window.location.href = "https://script.google.com/macros/s/AKfycbx3hYgvOz31LSAuih7gWl8rMfkQYccGALL_ftXLKO0J10iGJA5AdqZ9hZ9Ab5AUVVTolQ/exec";
}, 1200);
</script>

</body>
</html>
